name: Sync labels

# Upserts the labels defined in .github/labels.yml. Uses pre-installed gh + yq (no third-party
# action). Existing labels not listed here are left untouched.
on:
  push:
    branches: [main]
    paths: [".github/labels.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Upsert labels from .github/labels.yml
        run: |
          count=$(yq 'length' .github/labels.yml)
          for i in $(seq 0 $((count - 1))); do
            name=$(yq ".[$i].name" .github/labels.yml)
            color=$(yq ".[$i].color" .github/labels.yml)
            desc=$(yq ".[$i].description" .github/labels.yml)
            echo "Syncing: $name"
            gh label create "$name" --color "$color" --description "$desc" --force
          done
