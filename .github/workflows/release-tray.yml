name: Release Tray

# Builds the Shelfbound tray agent into Velopack installer + auto-update packages and publishes them to
# GitHub Releases. Triggered by a `tray-v*` tag (e.g. `tray-v0.6.0`) — a stream kept separate from any
# future CLI/dotnet-tool release so their assets never collide. `workflow_dispatch` builds the installers
# as downloadable artifacts only (no Release published), for testing before tagging.
#
# Platforms: Windows (Setup.exe) and Linux (AppImage) publish to the Release on a tag. macOS builds an
# UNSIGNED artifact only — signing + notarization are required before public macOS distribution (deferred).

on:
  push:
    tags:
      - "tray-v*"
  workflow_dispatch:

permissions:
  contents: read # checkout/build/test jobs and previous-release downloads

jobs:
  # Fail closed on the exact checked-out source identity before any test, pack, artifact, or publish work.
  identity:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.identity.outputs.version }}
      is_release: ${{ steps.identity.outputs.is_release }}
    steps:
      - uses: actions/checkout@v7
      - name: Validate tray release identity
        id: identity
        shell: pwsh
        run: >
          pwsh scripts/assert-tray-release.ps1
          -EventName '${{ github.event_name }}'
          -RefType '${{ github.ref_type }}'
          -RefName '${{ github.ref_name }}'
          -OutputPath $env:GITHUB_OUTPUT

  quality:
    needs: identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: decky/requirements-dev.txt
      - name: Install Decky test dependencies
        run: python -m pip install -r decky/requirements-dev.txt
      - name: Run complete release quality suite
        shell: pwsh
        run: pwsh scripts/test.ps1 -Configuration Release -WarnAsError
      - name: Run tray release-gate fixtures
        shell: pwsh
        run: pwsh scripts/test-tray-release-gates.ps1
      - name: Lint GitHub Actions workflows
        shell: pwsh
        run: pwsh scripts/actionlint.ps1

  windows:
    needs: [identity, quality]
    runs-on: windows-latest
    permissions:
      contents: write # creates the Release, uploads Windows updates, and sets its notes
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Verify committed icons
        run: pwsh scripts/icons.ps1 -Check
      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 1.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append
      - name: Publish (self-contained win-x64)
        run: dotnet publish src/Shelfbound.Tray/Shelfbound.Tray.csproj -c Release -r win-x64 --self-contained -o publish
      - name: Download previous release (for delta updates)
        if: needs.identity.outputs.is_release == 'true'
        continue-on-error: true # first release has nothing to delta against
        run: vpk download github --repoUrl "https://github.com/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}"
      - name: Pack (Velopack)
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $packArgs = @(
            'pack',
            '--packId', 'Shelfbound.Tray',
            '--packVersion', '${{ needs.identity.outputs.version }}',
            '--packDir', 'publish',
            '--mainExe', 'Shelfbound.Tray.exe',
            '--packTitle', 'Shelfbound',
            '--icon', 'assets/icon.ico'
          )
          # Code signing is optional — only signs when a certificate secret is configured.
          if ($env:WINDOWS_CERT_BASE64 -and $env:WINDOWS_CERT_PASSWORD) {
            $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
            $packArgs += @('--signParams', "/fd sha256 /f `"$pfx`" /p `"$env:WINDOWS_CERT_PASSWORD`" /tr http://timestamp.digicert.com /td sha256")
          } else {
            Write-Host '::notice::No code-signing cert configured — producing an unsigned installer.'
          }
          vpk @packArgs
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: shelfbound-tray-win-x64
          path: Releases/*Setup.exe
          if-no-files-found: error
      - name: Prepare GitHub Release notes from CHANGELOG
        if: needs.identity.outputs.is_release == 'true'
        run: >
          pwsh scripts/assert-tray-release.ps1
          -EventName '${{ github.event_name }}'
          -RefType '${{ github.ref_type }}'
          -RefName '${{ github.ref_name }}'
          -ReleaseNotesPath (Join-Path $env:RUNNER_TEMP 'release-notes.md')
      - name: Publish to GitHub Releases
        if: needs.identity.outputs.is_release == 'true'
        run: >
          vpk upload github
          --repoUrl "https://github.com/${{ github.repository }}"
          --token "${{ secrets.GITHUB_TOKEN }}"
          --publish
          --releaseName "Shelfbound Tray ${{ needs.identity.outputs.version }}"
          --tag "${{ github.ref_name }}"
      # Set the Release body from the file prepared by the same gate that validated this tagged commit.
      - name: Set release notes from CHANGELOG
        if: needs.identity.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit '${{ github.ref_name }}' --notes-file (Join-Path $env:RUNNER_TEMP 'release-notes.md')
          Write-Host "Release notes set from CHANGELOG [${{ needs.identity.outputs.version }}]."

  linux:
    # After windows so the tagged Release already exists — avoids a create-release race on first upload.
    needs: [identity, quality, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write # uploads Linux updates to the Release created by Windows
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Verify committed icons
        run: pwsh scripts/icons.ps1 -Check
      - name: Install AppImage runtime dependency
        run: sudo apt-get update && sudo apt-get install -y libfuse2
      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 1.2.0
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Publish (self-contained linux-x64)
        run: dotnet publish src/Shelfbound.Tray/Shelfbound.Tray.csproj -c Release -r linux-x64 --self-contained -o publish
      - name: Download previous release (for delta updates)
        if: needs.identity.outputs.is_release == 'true'
        continue-on-error: true
        run: vpk download github --repoUrl "https://github.com/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}"
      - name: Pack (Velopack → AppImage)
        run: >
          vpk pack
          --packId Shelfbound.Tray
          --packVersion "${{ needs.identity.outputs.version }}"
          --packDir publish
          --mainExe Shelfbound.Tray
          --packTitle Shelfbound
          --icon assets/icon-256.png
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: shelfbound-tray-linux-x64
          path: Releases/*.AppImage
          if-no-files-found: error
      - name: Publish to GitHub Releases
        if: needs.identity.outputs.is_release == 'true'
        run: >
          vpk upload github
          --repoUrl "https://github.com/${{ github.repository }}"
          --token "${{ secrets.GITHUB_TOKEN }}"
          --publish
          --releaseName "Shelfbound Tray ${{ needs.identity.outputs.version }}"
          --tag "${{ github.ref_name }}"

  macos:
    # Unsigned build for testers only — NOT published to the Release. Gatekeeper blocks unsigned/un-notarized
    # apps, so public macOS distribution waits on an Apple Developer cert + notarization (see the README).
    needs: [identity, quality]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Verify committed icons
        run: pwsh scripts/icons.ps1 -Check
      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk --version 1.2.0
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Publish (self-contained osx-arm64)
        run: dotnet publish src/Shelfbound.Tray/Shelfbound.Tray.csproj -c Release -r osx-arm64 --self-contained -o publish
      - name: Bundle (Velopack → .app, unsigned)
        run: >
          vpk bundle
          --packId Shelfbound.Tray
          --packVersion "${{ needs.identity.outputs.version }}"
          --packDir publish
          --mainExe Shelfbound.Tray
          --packTitle Shelfbound
          --icon assets/icon.icns
      - name: Upload build artifact (unsigned — testing only)
        uses: actions/upload-artifact@v7
        with:
          name: shelfbound-tray-osx-arm64-unsigned
          path: Releases/*.app/**
          if-no-files-found: error
