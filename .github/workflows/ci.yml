name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Lint GitHub Actions workflows
        shell: pwsh
        run: pwsh scripts/actionlint.ps1

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # package/schema gates compare against immutable v* releases
      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release -warnaserror
      # coverlet.collector (already referenced by the test project) emits Cobertura coverage.
      - run: dotnet test --no-build -c Release -warnaserror --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage
      - name: Release-gate rejection fixtures
        run: pwsh scripts/test-package-release-gates.ps1
      - name: Package identity, schema, and API compatibility
        run: pwsh scripts/test-package-release.ps1
      # Render a coverage table into the run's job summary — visibility without an external service.
      - name: Coverage summary
        if: ${{ !cancelled() && hashFiles('coverage/**/coverage.cobertura.xml') != '' }}
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:'./coverage/**/coverage.cobertura.xml' -targetdir:./coverage/report -reporttypes:MarkdownSummaryGithub
          cat ./coverage/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'push' && hashFiles('coverage/**/coverage.cobertura.xml') != '' }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/coverage.cobertura.xml
      - name: Upload coverage report
        if: ${{ !cancelled() && hashFiles('coverage/**/coverage.cobertura.xml') != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./coverage/**/coverage.cobertura.xml

  decky:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decky
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: decky/package.json
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: decky/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: decky/requirements-dev.txt
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest tests
