name: Publish NuGet

# Packs the reusable libraries (Shelfbound.Core / Query / Steam) and pushes them to NuGet.org.
# Triggered by a version tag (e.g. v0.4.0) or manually. Requires the NUGET_API_KEY repo secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet pack -c Release -o ./artifacts
      - run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
