name: Publish NuGet

# Packs the reusable libraries (Shelfbound.Core / Query / Steam) and pushes them to NuGet.org
# using Trusted Publishing (OIDC) — no long-lived API key is stored. A short-lived key is minted
# per run by exchanging a GitHub OIDC token against the policy configured on nuget.org.
#
# The nuget.org Trusted Publishing policy is bound to the GitHub `nuget` environment, so this job must
# declare `environment: nuget` for the OIDC token's environment claim to match. (Create the environment
# in repo Settings -> Environments if it doesn't exist yet.)
#
# Triggered by a version tag (e.g. v0.4.0) or manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  NUGET_USER: Wolfsblvt

permissions:
  contents: read
  id-token: write # required for Trusted Publishing (OIDC token issuance)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget # must match the environment in the nuget.org Trusted Publishing policy
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet pack -c Release -o ./artifacts
      - name: Mint a short-lived NuGet API key via Trusted Publishing
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_USER }}
      - run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
