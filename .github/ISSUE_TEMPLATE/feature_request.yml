name: Feature request
description: Suggest an improvement to the open-source core.
labels: ["type:feature", "status:needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Note: hosted/account/paid features are a separate, private product and out of scope here.
        This is for the local scanner, snapshot contract, CLI, and local MCP server.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and what's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: This is about the open-source core (not the hosted product).
          required: true
