version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:dependencies"
    # Avalonia packages form one framework graph and must move together, including majors.
    # Framework majors remain explicit review items rather than partial package bumps.
    groups:
      avalonia:
        applies-to: version-updates
        patterns: ["Avalonia*"]
      nuget-minor:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:maintenance"
      - "area:ci"
    groups:
      actions:
        patterns: ["*"]
