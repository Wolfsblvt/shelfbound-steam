version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - "type:maintenance"
      - "area:dependencies"
    # Bundle minor/patch bumps into one PR; majors still come separately for review.
    groups:
      nuget-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - "type:maintenance"
      - "area:ci"
    groups:
      actions:
        patterns: ["*"]
