# Canonical label set, synced by .github/workflows/labels.yml.
# Edit here, not in the GitHub UI.

# type:
- name: "type:bug"
  color: "d73a4a"
  description: "Something isn't working as expected"
- name: "type:feature"
  color: "a2eeef"
  description: "New capability or improvement"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:question"
  color: "d876e3"
  description: "A question or discussion"
- name: "type:refactor"
  color: "fbca04"
  description: "Internal change, no behavior difference"
- name: "type:maintenance"
  color: "fef2c0"
  description: "Chores, dependencies, tooling"
- name: "type:security"
  color: "b60205"
  description: "Security-relevant"

# area:
- name: "area:scanner"
  color: "1d76db"
  description: "Local Steam scanner (Shelfbound.Steam)"
- name: "area:snapshot"
  color: "1d76db"
  description: "Snapshot contract / Shelfbound.Core / schema"
- name: "area:cli"
  color: "1d76db"
  description: "Command-line tool (Shelfbound.Cli)"
- name: "area:mcp"
  color: "1d76db"
  description: "Local MCP server"
- name: "area:ci"
  color: "1d76db"
  description: "CI / workflows / tooling"
- name: "area:dependencies"
  color: "0366d6"
  description: "Dependency updates"

# status:
- name: "status:needs-triage"
  color: "ededed"
  description: "Awaiting first review"
- name: "status:needs-info"
  color: "ededed"
  description: "Waiting on more information"
- name: "status:accepted"
  color: "0e8a16"
  description: "Accepted, ready to be worked on"
- name: "status:blocked"
  color: "b60205"
  description: "Blocked by something else"
- name: "status:wontfix"
  color: "ffffff"
  description: "Will not be worked on"
- name: "status:duplicate"
  color: "cfd3d7"
  description: "Already tracked elsewhere"

# help / onboarding
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is welcome"
